services:
  - type: web
    name: ncwu-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx tsc; exit 0
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
        sync: false
    autoDeploy: true
